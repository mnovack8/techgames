<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Qubit Card Preview | Tech Board Games</title>
<style>
  body { background: #0d1117; display: flex; gap: 32px; padding: 40px; font-family: sans-serif; justify-content: center; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .label { color: #9ca3af; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .box { width: 240px; height: 280px; border-radius: 12px; overflow: hidden; position: relative; }

  /* ── OPTION A: Bloch Sphere ── */
  .opt-a {
    background: radial-gradient(ellipse at 40% 35%, #2d1b69 0%, #0d0720 60%, #000 100%);
  }
  .opt-a .sphere {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -54%);
    width: 130px; height: 130px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #a78bfa, #7c3aed 40%, #1e0a4e 75%, #0a0520 100%);
    box-shadow: 0 0 40px 12px rgba(139,92,246,0.5), 0 0 80px 30px rgba(109,40,217,0.25);
  }
  .opt-a .ring {
    position: absolute; top: 50%; left: 50%;
    border-radius: 50%; border: 1.5px solid rgba(196,181,253,0.35);
    transform-style: preserve-3d;
  }
  .opt-a .ring1 { width: 170px; height: 60px; margin: -30px 0 0 -85px; transform: rotateX(70deg); }
  .opt-a .ring2 { width: 60px; height: 170px; margin: -85px 0 0 -30px; transform: rotateY(70deg); }
  .opt-a .ring3 { width: 155px; height: 155px; margin: -77px 0 0 -77px; border-color: rgba(196,181,253,0.12); }
  .opt-a .vector {
    position: absolute; top: 50%; left: 50%; width: 2px; height: 56px;
    background: linear-gradient(to bottom, #e879f9, transparent);
    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(-28deg);
    border-radius: 2px;
    box-shadow: 0 0 8px #e879f9;
  }
  .opt-a .dot {
    position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
    background: #f0abfc; border-radius: 50%; transform: translate(-50%, -50%) translate(30px, -48px);
    box-shadow: 0 0 12px #e879f9;
  }
  .opt-a .label-ket {
    position: absolute; color: rgba(196,181,253,0.7); font-size: 11px; font-family: monospace;
  }
  .opt-a .ket0 { top: 18%; left: 50%; transform: translateX(-50%); }
  .opt-a .ket1 { bottom: 14%; left: 50%; transform: translateX(-50%); }
  .opt-a .particles { position: absolute; inset: 0; }
  .opt-a .p { position: absolute; width: 3px; height: 3px; border-radius: 50%; background: rgba(196,181,253,0.5); }

  /* ── OPTION B: Entanglement ── */
  .opt-b {
    background: radial-gradient(ellipse at 50% 50%, #001a33 0%, #000d1a 100%);
  }
  .opt-b svg { width: 100%; height: 100%; }

  /* ── OPTION C: Wave Superposition ── */
  .opt-c {
    background: linear-gradient(160deg, #001a12 0%, #000d0d 50%, #001520 100%);
  }
  .opt-c svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<!-- OPTION A: Bloch Sphere -->
<div class="option">
  <div class="box opt-a">
    <div class="ring ring3"></div>
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="sphere"></div>
    <div class="vector"></div>
    <div class="dot"></div>
    <span class="label-ket ket0">|0⟩</span>
    <span class="label-ket ket1">|1⟩</span>
    <!-- scattered particles -->
    <div class="particles">
      <div class="p" style="top:15%;left:20%"></div>
      <div class="p" style="top:22%;left:78%"></div>
      <div class="p" style="top:70%;left:15%"></div>
      <div class="p" style="top:75%;left:80%"></div>
      <div class="p" style="top:88%;left:45%"></div>
      <div class="p" style="top:10%;left:60%"></div>
    </div>
  </div>
  <div class="label">Option A — Bloch Sphere</div>
</div>

<!-- OPTION B: Entanglement Web -->
<div class="option">
  <div class="box opt-b">
    <svg viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="gb1" cx="35%" cy="42%"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0e7490" stop-opacity="0"/></radialGradient>
        <radialGradient id="gb2" cx="65%" cy="58%"><stop offset="0%" stop-color="#a21caf"/><stop offset="100%" stop-color="#701a75" stop-opacity="0"/></radialGradient>
        <radialGradient id="gb3" cx="50%" cy="50%"><stop offset="0%" stop-color="#0f172a" stop-opacity="0"/><stop offset="100%" stop-color="#0f172a"/></radialGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- Background glow blobs -->
      <ellipse cx="84" cy="118" rx="70" ry="70" fill="url(#gb1)" opacity="0.6"/>
      <ellipse cx="156" cy="162" rx="70" ry="70" fill="url(#gb2)" opacity="0.6"/>
      <!-- Entanglement lines -->
      <line x1="84" y1="118" x2="156" y2="162" stroke="url(#entLine)" stroke-width="1.5" opacity="0.8"/>
      <defs>
        <linearGradient id="entLine" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#22d3ee"/>
          <stop offset="100%" stop-color="#e879f9"/>
        </linearGradient>
      </defs>
      <!-- Orbital paths -->
      <ellipse cx="84" cy="118" rx="52" ry="20" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25" transform="rotate(-30 84 118)"/>
      <ellipse cx="84" cy="118" rx="20" ry="52" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25" transform="rotate(-30 84 118)"/>
      <ellipse cx="156" cy="162" rx="52" ry="20" fill="none" stroke="#e879f9" stroke-width="1" opacity="0.25" transform="rotate(30 156 162)"/>
      <ellipse cx="156" cy="162" rx="20" ry="52" fill="none" stroke="#e879f9" stroke-width="1" opacity="0.25" transform="rotate(30 156 162)"/>
      <!-- Connecting web lines -->
      <line x1="84" y1="66" x2="156" y2="110" stroke="#67e8f9" stroke-width="0.5" opacity="0.3"/>
      <line x1="32" y1="118" x2="156" y2="162" stroke="#67e8f9" stroke-width="0.5" opacity="0.2"/>
      <line x1="84" y1="170" x2="208" y2="162" stroke="#f0abfc" stroke-width="0.5" opacity="0.2"/>
      <line x1="84" y1="118" x2="156" y2="214" stroke="#f0abfc" stroke-width="0.5" opacity="0.2"/>
      <!-- Node 1 -->
      <circle cx="84" cy="118" r="16" fill="#0e7490" opacity="0.7" filter="url(#glow)"/>
      <circle cx="84" cy="118" r="10" fill="#22d3ee" opacity="0.9"/>
      <circle cx="84" cy="118" r="5" fill="#cffafe"/>
      <!-- Node 2 -->
      <circle cx="156" cy="162" r="16" fill="#701a75" opacity="0.7" filter="url(#glow)"/>
      <circle cx="156" cy="162" r="10" fill="#e879f9" opacity="0.9"/>
      <circle cx="156" cy="162" r="5" fill="#fae8ff"/>
      <!-- Small satellite nodes -->
      <circle cx="46" cy="85" r="4" fill="#67e8f9" opacity="0.6"/>
      <circle cx="130" cy="55" r="3" fill="#67e8f9" opacity="0.4"/>
      <circle cx="200" cy="130" r="4" fill="#f0abfc" opacity="0.5"/>
      <circle cx="170" cy="218" r="3" fill="#f0abfc" opacity="0.4"/>
      <line x1="46" y1="85" x2="84" y2="118" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
      <line x1="130" y1="55" x2="84" y2="118" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>
      <line x1="200" y1="130" x2="156" y2="162" stroke="#e879f9" stroke-width="0.8" opacity="0.35"/>
      <line x1="170" y1="218" x2="156" y2="162" stroke="#e879f9" stroke-width="0.8" opacity="0.3"/>
      <!-- Labels -->
      <text x="72" y="103" fill="rgba(103,232,249,0.7)" font-size="9" font-family="monospace">|ψ₁⟩</text>
      <text x="160" y="153" fill="rgba(240,171,252,0.7)" font-size="9" font-family="monospace">|ψ₂⟩</text>
    </svg>
  </div>
  <div class="label">Option B — Entanglement</div>
</div>

<!-- OPTION C: Wave Superposition -->
<div class="option">
  <div class="box opt-c">
    <svg viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="wg1" x1="0%" x2="100%"><stop offset="0%" stop-color="#10b981" stop-opacity="0"/><stop offset="50%" stop-color="#10b981"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/></linearGradient>
        <linearGradient id="wg2" x1="0%" x2="100%"><stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/><stop offset="50%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/></linearGradient>
        <linearGradient id="wg3" x1="0%" x2="100%"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/><stop offset="50%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/></linearGradient>
        <filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- Grid lines -->
      <line x1="0" y1="70"  x2="240" y2="70"  stroke="#1e3a2a" stroke-width="0.5"/>
      <line x1="0" y1="140" x2="240" y2="140" stroke="#1e3a2a" stroke-width="0.5"/>
      <line x1="0" y1="210" x2="240" y2="210" stroke="#1e3a2a" stroke-width="0.5"/>
      <line x1="60"  y1="0" x2="60"  y2="280" stroke="#1e3a2a" stroke-width="0.5"/>
      <line x1="120" y1="0" x2="120" y2="280" stroke="#1e3a2a" stroke-width="0.5"/>
      <line x1="180" y1="0" x2="180" y2="280" stroke="#1e3a2a" stroke-width="0.5"/>
      <!-- Wave 1 — emerald -->
      <path d="M0,140 C20,90 40,90 60,140 C80,190 100,190 120,140 C140,90 160,90 180,140 C200,190 220,190 240,140" fill="none" stroke="url(#wg1)" stroke-width="2.5" filter="url(#glow2)" opacity="0.9"/>
      <!-- Wave 2 — cyan, offset -->
      <path d="M0,105 C30,55 50,55 80,105 C110,155 130,155 160,105 C190,55 210,55 240,105" fill="none" stroke="url(#wg2)" stroke-width="2" filter="url(#glow2)" opacity="0.7"/>
      <!-- Wave 3 — purple, offset -->
      <path d="M0,175 C25,125 45,125 70,175 C95,225 115,225 140,175 C165,125 185,125 210,175 C225,200 235,200 240,175" fill="none" stroke="url(#wg3)" stroke-width="1.5" filter="url(#glow2)" opacity="0.6"/>
      <!-- Probability envelope -->
      <path d="M0,140 C60,50 180,50 240,140" fill="none" stroke="#10b981" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>
      <path d="M0,140 C60,230 180,230 240,140" fill="none" stroke="#10b981" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>
      <!-- Interference dots -->
      <circle cx="60"  cy="140" r="4" fill="#10b981" opacity="0.8" filter="url(#glow2)"/>
      <circle cx="120" cy="140" r="4" fill="#06b6d4" opacity="0.8" filter="url(#glow2)"/>
      <circle cx="180" cy="140" r="4" fill="#a78bfa" opacity="0.8" filter="url(#glow2)"/>
      <circle cx="0"   cy="140" r="3" fill="#10b981" opacity="0.5"/>
      <circle cx="240" cy="140" r="3" fill="#10b981" opacity="0.5"/>
      <!-- Labels -->
      <text x="8"  y="26" fill="rgba(16,185,129,0.6)" font-size="9" font-family="monospace">ψ(x)</text>
      <text x="155" y="265" fill="rgba(107,114,128,0.6)" font-size="9" font-family="monospace">|amplitude|²</text>
    </svg>
  </div>
  <div class="label">Option C — Wave Function</div>
</div>

</body>
</html>
