<svg viewBox="0 0 150 110" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ===== PLATFORM ===== -->
  <!-- Cylinder side (dark rim) -->
  <path d="M22,85 Q46,95 70,85 L70,93 Q46,103 22,93 Z" fill="#1a1a1a"/>
  <!-- Green platform top -->
  <ellipse cx="46" cy="85" rx="24" ry="9" fill="#7bc142"/>
  <!-- Platform outline -->
  <ellipse cx="46" cy="85" rx="24" ry="9" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- ===== FIGURE ===== -->
  <!-- Legs -->
  <line x1="46" y1="72" x2="39" y2="85" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="46" y1="72" x2="53" y2="85" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Body -->
  <line x1="46" y1="44" x2="46" y2="72" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Pointing arm (raised, right) -->
  <line x1="46" y1="54" x2="72" y2="42" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Other arm (down-left) -->
  <line x1="46" y1="54" x2="36" y2="66" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="46" cy="34" r="10" fill="#1a1a1a"/>

  <!-- ===== SMALL CIRCLE LEFT OF BASE ===== -->
  <line x1="14" y1="85" x2="22" y2="85" stroke="#1a1a1a" stroke-width="1.8"/>
  <circle cx="10" cy="85" r="5" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- ===== BRANCH LINES from arm tip ===== -->
  <!-- Spine from arm to fork -->
  <line x1="72" y1="42" x2="90" y2="42" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Fork up to yellow dot -->
  <path d="M90,42 L108,18" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fork straight to empty circle -->
  <line x1="90" y1="42" x2="108" y2="42" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Fork down to X circle -->
  <path d="M90,42 L108,66" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== ENDPOINTS ===== -->
  <!-- Top: filled yellow circle -->
  <circle cx="120" cy="18" r="11" fill="#f5c42c" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Middle: empty circle -->
  <circle cx="120" cy="42" r="11" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Bottom: circle with X -->
  <circle cx="120" cy="66" r="11" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="114" y1="60" x2="126" y2="72" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="126" y1="60" x2="114" y2="72" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

</svg>
