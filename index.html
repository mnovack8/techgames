<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuzzNet Labs - Animal Classifier</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif; background: #f4f1ec; color: #3a3a3a; min-height: 100vh; overflow-x: hidden; }

/* ===== SCREENS ===== */
.screen { display: none; }
.screen.active { display: flex; }

/* ===== LOBBY ===== */
#lobby { flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; background: linear-gradient(160deg, #f7f5f0 0%, #eae6dd 100%); }
#lobby h1 { font-size: 44px; color: #2d6a4f; letter-spacing: 2px; font-weight: 800; }
#lobby .subtitle { font-size: 16px; color: #888; margin-top: -10px; }

.lobby-card { background: #ffffff; border: 1px solid #ddd; border-radius: 14px; padding: 24px; width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.lobby-card h3 { font-size: 15px; color: #777; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }

.color-options { display: flex; gap: 10px; justify-content: center; margin: 12px 0; }
.color-btn { width: 56px; height: 56px; border-radius: 12px; border: 3px solid transparent; cursor: pointer; font-size: 11px; font-weight: bold; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.3); transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.color-btn:hover { transform: scale(1.08); }
.color-btn.selected { border-color: #333; box-shadow: 0 0 0 3px rgba(0,0,0,0.15); }
.color-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

.lobby-btn { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: all 0.15s; margin-top: 8px; }
.lobby-btn:hover:not(:disabled) { transform: scale(1.01); filter: brightness(1.05); }
.lobby-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-create { background: #2d6a4f; color: white; }
.btn-join { background: #52796f; color: white; }

.lobby-input { width: 100%; padding: 12px 16px; font-size: 20px; text-align: center; letter-spacing: 8px; text-transform: uppercase; background: #f8f7f4; border: 2px solid #ccc; border-radius: 8px; color: #333; font-weight: bold; margin: 8px 0; }
.lobby-input::placeholder { letter-spacing: 2px; font-size: 14px; color: #aaa; }
.lobby-input:focus { outline: none; border-color: #2d6a4f; }

.error-msg { color: #d44; font-size: 13px; text-align: center; margin-top: 6px; min-height: 20px; }

/* ===== WAITING ROOM ===== */
#waiting { flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; background: linear-gradient(160deg, #f7f5f0 0%, #eae6dd 100%); }
.room-code-display { font-size: 52px; font-weight: 800; letter-spacing: 12px; color: #2d6a4f; background: #fff; padding: 16px 36px; border-radius: 14px; border: 2px solid #c5d5c0; cursor: pointer; user-select: all; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.room-code-display:hover { border-color: #2d6a4f; }
.room-hint { font-size: 14px; color: #888; }
.player-list { display: flex; flex-direction: column; gap: 8px; min-width: 240px; margin: 8px 0; }
.player-slot { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: #fff; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.player-slot .dot { width: 14px; height: 14px; border-radius: 50%; }
.player-slot .host-badge { font-size: 11px; color: #c90; margin-left: auto; font-weight: 700; }
.waiting-actions { display: flex; gap: 10px; }
.waiting-actions button { padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; font-weight: 700; }
#btn-start-game { background: #2d6a4f; color: white; }
#btn-start-game:disabled { opacity: 0.4; cursor: not-allowed; }
#btn-leave { background: #e0ddd6; color: #777; }
#btn-leave:hover { background: #d0cdc6; color: #555; }

/* ===== GAME SCREEN ===== */
#game { flex-direction: column; height: 100vh; background: #f4f1ec; }
#top-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: #fff; border-bottom: 2px solid #e0ddd6; gap: 12px; flex-wrap: wrap; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
#top-bar .player-info { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: #444; }
.player-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
#top-bar .round-info { font-size: 13px; color: #888; font-weight: 600; }
.room-badge { font-size: 12px; color: #999; background: #f0ede6; padding: 3px 10px; border-radius: 6px; font-weight: 700; }
.view-toggle { display: flex; gap: 4px; }
.view-btn { padding: 5px 12px; font-size: 12px; border-radius: 6px; border: 2px solid #ddd; background: #fff; color: #888; cursor: pointer; position: relative; transition: all 0.15s; font-weight: 600; }
.view-btn:hover { background: #f5f3ee; color: #555; }
.view-btn.active { border-color: #2d6a4f; color: #2d6a4f; background: #eef5ee; }
.view-btn .vb-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
.view-btn.is-turn { box-shadow: 0 0 8px rgba(45,106,79,0.3); }
.view-btn.is-turn::after { content: '◀'; font-size: 8px; margin-left: 4px; vertical-align: middle; }
.actions-info { font-size: 14px; color: #777; }
.actions-count { color: #2d6a4f; font-weight: 800; font-size: 16px; }

#main-area { display: flex; flex: 1; overflow: hidden; }
#board-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; background: #f4f1ec; }
#board-svg { width: 100%; max-width: 860px; height: auto; }

#side-panel { width: 310px; min-width: 280px; display: flex; flex-direction: column; gap: 6px; padding: 10px; background: #fff; border-left: 2px solid #e0ddd6; overflow-y: auto; }
.section-title { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; padding: 2px 0; font-weight: 700; }

/* ===== ACTION BUTTONS ===== */
.action-btns { display: flex; flex-direction: column; gap: 6px; }
.action-btn { padding: 8px 14px; font-size: 14px; border: 2px solid #ddd; border-radius: 8px; background: #faf9f6; color: #555; cursor: pointer; text-align: left; transition: all 0.15s; font-weight: 600; }
.action-btn:hover:not(:disabled) { border-color: #2d6a4f; color: #2d6a4f; background: #eef5ee; }
.action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.end-turn-btn { padding: 8px 14px; font-size: 13px; border: 2px solid #ddd; border-radius: 8px; background: #faf9f6; color: #888; cursor: pointer; text-align: center; margin-top: 4px; font-weight: 600; }
.end-turn-btn:hover { border-color: #c90; color: #a80; }

/* ===== STATUS BAR ===== */
#status { padding: 8px 16px; min-height: 40px; background: #fff; border-top: 2px solid #e0ddd6; font-size: 13px; color: #666; display: flex; align-items: center; gap: 10px; }
#status .msg { flex: 1; }
#status button { padding: 5px 16px; border-radius: 6px; border: 1px solid #ccc; background: #f5f3ee; color: #555; cursor: pointer; font-size: 12px; white-space: nowrap; font-weight: 600; }
#status button:hover { border-color: #2d6a4f; color: #2d6a4f; }
#status button.primary { background: #2d6a4f; border-color: #2d6a4f; color: white; }
#status button.danger { background: #d44; border-color: #d44; color: white; }

/* ===== DICE ===== */
.dice-area { display: flex; gap: 8px; justify-content: center; padding: 6px 0; }
.die { width: 44px; height: 44px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #333; cursor: default; transition: all 0.15s; border: 3px solid #ddd; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.die.clickable { cursor: pointer; border-color: #2d6a4f; }
.die.clickable:hover { transform: scale(1.1); }
.die.selected { border-color: #d44; background: #fef0f0; }

/* ===== CLEAN DATA TRACKER ===== */
.clean-tracker { display: flex; gap: 4px; align-items: center; justify-content: center; padding: 4px 0; }
.clean-step { width: 34px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; background: #faf9f6; border: 1px solid #ddd; color: #aaa; }
.clean-step.active { background: #fce4d6; border-color: #e8a87c; color: #c07040; }
.clean-step.used { background: #f0e0e0; border-color: #d4a0a0; color: #a06060; }

/* ===== SCOREBOARD ===== */
.scoreboard { background: #faf9f6; border-radius: 10px; padding: 8px; flex-shrink: 0; border: 1px solid #e8e4dc; }
.score-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.score-table th { text-align: left; padding: 3px 5px; color: #999; font-weight: 600; border-bottom: 1px solid #e8e4dc; }
.score-table td { padding: 3px 5px; border-bottom: 1px solid #f0ede6; }
.score-table .score-val { text-align: center; font-weight: bold; }
.score-animal { font-size: 16px; }

/* ===== SVG STYLES ===== */
.edge-line { stroke: #c8c4ba; stroke-width: 2; transition: all 0.2s; }
.edge-line.blocked { stroke: #222; stroke-width: 3; stroke-dasharray: 8,4; }
.edge-line.path-highlight { stroke: #2d6a4f; stroke-width: 4; opacity: 0.9; }
.edge-line.selectable { stroke: #e8a030; stroke-width: 3; opacity: 0.8; cursor: pointer; }

.node-circle { fill: #e8e4dc; stroke: #bbb; stroke-width: 2; transition: all 0.2s; cursor: default; }
.node-circle.placed { fill: #d0d8cf; stroke: #7a9a78; }
.node-circle.maxed { fill: #fce4b8; stroke: #d4a030; stroke-width: 3; }
.node-circle.clickable { cursor: pointer; stroke: #2d6a4f; stroke-width: 3; stroke-dasharray: 6,3; }
.node-circle.clickable:hover { fill: #d5e5d0; }
.node-circle.path-selected { fill: #c8e6c0; stroke: #2d6a4f; stroke-width: 3; }

.node-data { font-size: 16px; font-weight: bold; fill: #2d8a4f; pointer-events: none; }
.node-label { font-size: 11px; fill: #999; pointer-events: none; }
.input-label, .output-label { font-size: 14px; fill: #666; cursor: default; }
.input-emoji, .output-emoji { font-size: 24px; cursor: default; }
.input-label.clickable, .input-emoji.clickable { cursor: pointer; }
.input-label.clickable:hover, .input-emoji.clickable:hover { fill: #2d6a4f; }
.input-label.highlight, .input-emoji.highlight { fill: #2d6a4f; }
.overfit-x { stroke: #333; stroke-width: 3; pointer-events: none; }

/* ===== GAME OVER ===== */
#gameover { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
#gameover h2 { font-size: 36px; color: #2d6a4f; font-weight: 800; }
.final-scores { background: #fff; border-radius: 12px; padding: 20px; min-width: 300px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
.final-scores table { width: 100%; border-collapse: collapse; }
.final-scores th, .final-scores td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e8e4dc; color: #444; }
.final-scores .winner { color: #c90; font-weight: bold; }
#play-again-btn { padding: 12px 36px; font-size: 16px; border: none; border-radius: 8px; background: #2d6a4f; color: white; cursor: pointer; font-weight: 700; }
</style>
</head>
<body>

<!-- ===== LOBBY ===== -->
<div id="lobby" class="screen active">
  <h1>FuzzNet Labs</h1>
  <div class="subtitle">Animal Photo Classifier — The Board Game</div>

  <div class="lobby-card">
    <h3>Create a New Game</h3>
    <div style="font-size:13px; color:#888; margin-bottom:8px;">Pick your color:</div>
    <div class="color-options" id="create-colors">
      <button class="color-btn selected" data-color="blue" style="background:#4a9eff" onclick="selectCreateColor('blue')">Blue</button>
      <button class="color-btn" data-color="red" style="background:#ff4a4a" onclick="selectCreateColor('red')">Red</button>
      <button class="color-btn" data-color="green" style="background:#3aaa6a" onclick="selectCreateColor('green')">Green</button>
      <button class="color-btn" data-color="purple" style="background:#a060dd" onclick="selectCreateColor('purple')">Purple</button>
    </div>
    <button class="lobby-btn btn-create" onclick="createRoom()">Create Game</button>
  </div>

  <div class="lobby-card">
    <h3>Join a Game</h3>
    <input class="lobby-input" id="join-code" maxlength="4" placeholder="CODE" oninput="checkRoom()">
    <div class="color-options" id="join-colors" style="opacity:0.3; pointer-events:none;">
      <button class="color-btn" data-color="blue" style="background:#4a9eff" onclick="selectJoinColor('blue')">Blue</button>
      <button class="color-btn" data-color="red" style="background:#ff4a4a" onclick="selectJoinColor('red')">Red</button>
      <button class="color-btn" data-color="green" style="background:#3aaa6a" onclick="selectJoinColor('green')">Green</button>
      <button class="color-btn" data-color="purple" style="background:#a060dd" onclick="selectJoinColor('purple')">Purple</button>
    </div>
    <button class="lobby-btn btn-join" id="btn-join" disabled onclick="joinRoom()">Join Game</button>
    <div class="error-msg" id="lobby-error"></div>
  </div>
</div>

<!-- ===== WAITING ROOM ===== -->
<div id="waiting" class="screen">
  <div style="font-size:14px; color:#888;">Room Code</div>
  <div class="room-code-display" id="room-code-display" title="Click to copy" onclick="copyCode()">----</div>
  <div class="room-hint">Share this code with other players to join</div>
  <div class="player-list" id="player-list"></div>
  <div class="waiting-actions">
    <button id="btn-start-game" onclick="startGame()" disabled>Start Game</button>
    <button id="btn-leave" onclick="leaveRoom()">Leave</button>
  </div>
  <div class="error-msg" id="waiting-error"></div>
</div>

<!-- ===== GAME ===== -->
<div id="game" class="screen">
  <div id="top-bar">
    <div class="player-info">
      <span class="player-dot" id="turn-dot"></span>
      <span id="turn-name">Blue's Turn</span>
    </div>
    <div class="view-toggle" id="view-toggle"></div>
    <span class="room-badge" id="room-badge">ABCD</span>
    <div class="round-info" id="round-info">Round 1</div>
    <div class="actions-info">Actions: <span class="actions-count" id="actions-count">3</span></div>
  </div>

  <div id="main-area">
    <div id="board-container">
      <svg id="board-svg" viewBox="0 0 870 490"></svg>
    </div>
    <div id="side-panel">
      <div class="section-title">Actions</div>
      <div class="action-btns">
        <button class="action-btn" id="btn-design" onclick="doAction('start_design')">🧠 Design Model</button>
        <button class="action-btn" id="btn-train" onclick="doAction('start_train')">📊 Train Model</button>
        <button class="action-btn" id="btn-test" onclick="doAction('start_test')">🧪 Test Model</button>
      </div>
      <button class="end-turn-btn" id="btn-end-turn" onclick="doAction('end_turn')" style="display:none">Skip Remaining Actions</button>

      <div class="section-title" style="margin-top:6px">Clean Data Track</div>
      <div class="clean-tracker" id="clean-tracker"></div>

      <div class="section-title">Dice</div>
      <div class="dice-area" id="dice-area">
        <div class="die" id="die-0">-</div>
        <div class="die" id="die-1">-</div>
        <div class="die" id="die-2">-</div>
      </div>
      <div id="test-info" style="text-align:center;font-size:13px;color:#888;padding:2px 0"></div>

      <div class="section-title">Scoreboard</div>
      <div class="scoreboard" id="scoreboard"></div>
    </div>
  </div>

  <div id="status"><span class="msg" id="status-msg">Choose an action.</span></div>
</div>

<!-- ===== GAME OVER ===== -->
<div id="gameover" class="screen">
  <h2>Game Over!</h2>
  <div class="final-scores" id="final-scores"></div>
  <button id="play-again-btn" onclick="leaveRoom(); showScreen('lobby');">Play Again</button>
</div>

<script>
// ==================== CONSTANTS ====================
const ANIMALS = ['Dog', 'Bunny', 'Frog', 'Squirrel', 'Fish'];
const ANIMAL_IMGS = ['dog', 'bunny', 'frog', 'squirrel', 'fish'];
const TEST_THRESHOLD = 18;
const CLEAN_PENALTIES = [0, -1, -2, -4, -6];
const SCORE_VALUES = { 2: [5, 3], 3: [5, 3, 2], 4: [5, 4, 3, 2] };

const NP = [
  {x:230,y:80},{x:230,y:180},{x:230,y:280},{x:230,y:380},
  {x:400,y:130},{x:400,y:230},{x:400,y:330},
  {x:570,y:80},{x:570,y:180},{x:570,y:280},{x:570,y:380},
];
const INP = [{x:60,y:60},{x:60,y:160},{x:60,y:260},{x:60,y:360},{x:60,y:460}];
const OUTP = [{x:770,y:60},{x:770,y:160},{x:770,y:260},{x:770,y:360},{x:770,y:460}];

const INPUT_TO_L1 = {0:[0],1:[0,1],2:[1,2],3:[2,3],4:[3]};
const L1_TO_L2 = {0:[4,6],1:[4,5],2:[5,6],3:[4,6]};
const L2_TO_L3 = {4:[7,8],5:[8,9],6:[9,10]};
const L3_TO_OUT = {7:[0,1],8:[1,2],9:[2,3],10:[3,4]};

function getAllEdges() {
  const edges = [];
  for (const [i, nodes] of Object.entries(INPUT_TO_L1))
    for (const n of nodes) edges.push({from:'in'+i, to:'n'+n, key:'in'+i+'-'+n});
  for (const [a, nodes] of Object.entries(L1_TO_L2))
    for (const b of nodes) edges.push({from:'n'+a, to:'n'+b, key:a+'-'+b});
  for (const [a, nodes] of Object.entries(L2_TO_L3))
    for (const b of nodes) edges.push({from:'n'+a, to:'n'+b, key:a+'-'+b});
  for (const [a, outs] of Object.entries(L3_TO_OUT))
    for (const o of outs) edges.push({from:'n'+a, to:'out'+o, key:a+'-out'+o});
  return edges;
}

function edgePos(e) {
  let x1,y1,x2,y2;
  if (e.from.startsWith('in')) { const i=parseInt(e.from.slice(2)); x1=INP[i].x+30; y1=INP[i].y; }
  else { const i=parseInt(e.from.slice(1)); x1=NP[i].x; y1=NP[i].y; }
  if (e.to.startsWith('out')) { const i=parseInt(e.to.slice(3)); x2=OUTP[i].x-30; y2=OUTP[i].y; }
  else { const i=parseInt(e.to.slice(1)); x2=NP[i].x; y2=NP[i].y; }
  return {x1,y1,x2,y2};
}

const ALL_EDGES = getAllEdges();

// ==================== CLIENT STATE ====================
let ws = null;
let myId = -1;
let roomCode = '';
let isHost = false;
let viewingPlayer = -1; // -1 = my board
let G = null;
let selectedDice = new Set();
let createColor = 'blue';
let joinColor = '';
let joinAvailable = [];
let prevCurrentPlayer = -1;

// ==================== WEBSOCKET ====================
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onmessage = (e) => handleServerMsg(JSON.parse(e.data));
}

function sendMsg(msg) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
}

function handleServerMsg(msg) {
  switch (msg.type) {
    case 'room_created':
      roomCode = msg.code; myId = msg.yourId; isHost = true;
      showScreen('waiting');
      document.getElementById('room-code-display').textContent = roomCode;
      break;
    case 'room_info':
      handleRoomInfo(msg);
      break;
    case 'room_joined':
      roomCode = msg.code; myId = msg.yourId; isHost = false;
      showScreen('waiting');
      document.getElementById('room-code-display').textContent = roomCode;
      break;
    case 'lobby_update':
      renderLobbyPlayers(msg.players);
      break;
    case 'game_started':
      viewingPlayer = -1;
      showScreen('game');
      break;
    case 'state_update':
      myId = msg.yourId;
      G = msg.state;
      // Auto-switch to own board when your turn starts
      if (G.currentPlayer === myId && prevCurrentPlayer !== myId) {
        viewingPlayer = -1;
        selectedDice = new Set();
      }
      prevCurrentPlayer = G.currentPlayer;
      renderGame();
      if (G.gameOver) showGameOver();
      break;
    case 'left_room':
      roomCode = ''; myId = -1; G = null;
      showScreen('lobby');
      break;
    case 'error': {
      const lobbyActive = document.getElementById('lobby').classList.contains('active');
      const waitActive = document.getElementById('waiting').classList.contains('active');
      if (lobbyActive) document.getElementById('lobby-error').textContent = msg.msg;
      else if (waitActive) document.getElementById('waiting-error').textContent = msg.msg;
      if (msg.availableColors) { joinAvailable = msg.availableColors; renderJoinColors(); }
      break;
    }
  }
}

// ==================== SCREENS ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==================== LOBBY ====================
function selectCreateColor(color) {
  createColor = color;
  document.querySelectorAll('#create-colors .color-btn').forEach(b =>
    b.classList.toggle('selected', b.dataset.color === color));
}
function selectJoinColor(color) {
  joinColor = color;
  document.querySelectorAll('#join-colors .color-btn').forEach(b =>
    b.classList.toggle('selected', b.dataset.color === color));
  document.getElementById('btn-join').disabled = !joinColor;
}
function renderJoinColors() {
  const c = document.getElementById('join-colors');
  c.style.opacity = '1'; c.style.pointerEvents = 'auto';
  c.querySelectorAll('.color-btn').forEach(b => {
    b.disabled = !joinAvailable.includes(b.dataset.color);
    b.classList.remove('selected');
  });
  joinColor = '';
  document.getElementById('btn-join').disabled = true;
}
function checkRoom() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  document.getElementById('lobby-error').textContent = '';
  if (code.length === 4) sendMsg({ type: 'check_room', code });
  else {
    document.getElementById('join-colors').style.opacity = '0.3';
    document.getElementById('join-colors').style.pointerEvents = 'none';
    document.getElementById('btn-join').disabled = true;
  }
}
function handleRoomInfo(msg) {
  const el = document.getElementById('lobby-error');
  if (!msg.exists) { el.textContent = 'Room not found'; return; }
  if (msg.started) { el.textContent = 'Game already started'; return; }
  if (msg.full) { el.textContent = 'Room is full'; return; }
  el.textContent = '';
  joinAvailable = msg.availableColors || [];
  renderJoinColors();
}
function createRoom() { sendMsg({ type: 'create_room', color: createColor }); }
function joinRoom() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code || !joinColor) return;
  sendMsg({ type: 'join_room', code, color: joinColor });
}
function leaveRoom() {
  sendMsg({ type: 'leave_room' });
  roomCode = ''; myId = -1; G = null; isHost = false;
}
function copyCode() {
  navigator.clipboard.writeText(roomCode).catch(()=>{});
}

// ==================== WAITING ROOM ====================
function getHex(color) {
  return {blue:'#4a9eff',red:'#ff4a4a',green:'#4aff8a',purple:'#c880ff'}[color]||'#888';
}
function renderLobbyPlayers(players) {
  const list = document.getElementById('player-list');
  list.innerHTML = players.map(p =>
    `<div class="player-slot"><span class="dot" style="background:${getHex(p.color)}"></span><span>${p.name}</span>${p.isHost?'<span class="host-badge">HOST</span>':''}</div>`
  ).join('');
  const btn = document.getElementById('btn-start-game');
  btn.style.display = isHost ? 'inline-block' : 'none';
  btn.disabled = players.length < 2;
  document.getElementById('waiting-error').textContent =
    isHost ? (players.length < 2 ? 'Need at least 2 players' : '') :
    (players.length < 2 ? 'Waiting for more players...' : 'Waiting for host to start...');
}
function startGame() { sendMsg({ type: 'start_game' }); }

// ==================== GAME RENDERING ====================
function isMyTurn() { return G && G.currentPlayer === myId && !G.gameOver; }
function viewedIdx() { return (viewingPlayer === -1) ? myId : viewingPlayer; }
function vp() { return G ? G.players[viewedIdx()] : null; }
function cp() { return G ? G.players[G.currentPlayer] : null; }

function renderGame() {
  if (!G) return;
  renderTopBar(); renderBoard(); renderSidePanel(); renderStatus();
}

function renderTopBar() {
  const c = cp();
  document.getElementById('turn-dot').style.background = c.hex;
  document.getElementById('turn-name').textContent = (G.currentPlayer === myId ? 'Your' : c.name + "'s") + ' Turn';
  document.getElementById('round-info').textContent = 'Round ' + G.round + (G.gameEnding ? ' (Final)' : '');
  document.getElementById('room-badge').textContent = roomCode;
  document.getElementById('actions-count').textContent = G.actionsLeft;

  // Build player board tabs: your board first, then others in player order
  const order = [myId];
  for (let i = 0; i < G.players.length; i++) { if (i !== myId) order.push(i); }
  let vhtml = '';
  for (const idx of order) {
    const p = G.players[idx];
    const isViewed = viewedIdx() === idx;
    const isTurn = G.currentPlayer === idx;
    const label = idx === myId ? 'You' : p.name;
    let cls = 'view-btn';
    if (isViewed) cls += ' active';
    if (isTurn) cls += ' is-turn';
    const viewArg = idx === myId ? -1 : idx;
    vhtml += `<button class="${cls}" onclick="setView(${viewArg})"><span class="vb-dot" style="background:${p.hex}"></span>${label}</button>`;
  }
  document.getElementById('view-toggle').innerHTML = vhtml;
}

function setView(id) { viewingPlayer = id; renderGame(); }

function colorizeFilter(hex) {
  const map = {
    '#4a9eff': 'grayscale(1) sepia(1) hue-rotate(180deg) saturate(3) brightness(0.95)',
    '#ff4a4a': 'grayscale(1) sepia(1) hue-rotate(330deg) saturate(4) brightness(0.9)',
    '#4aff8a': 'grayscale(1) sepia(1) hue-rotate(115deg) saturate(3) brightness(0.9)',
    '#c880ff': 'grayscale(1) sepia(1) hue-rotate(250deg) saturate(3) brightness(0.9)',
  };
  return map[hex] || 'grayscale(1)';
}

function renderBoard() {
  const svg = document.getElementById('board-svg');
  const p = vp(); if (!p) return;
  const canAct = isMyTurn() && viewedIdx() === myId;
  let html = '';

  // Edges
  for (const e of ALL_EDGES) {
    const {x1,y1,x2,y2} = edgePos(e);
    let cls = 'edge-line';
    if (p.blocked.includes(e.key)) cls += ' blocked';
    else if (canAct && G.phase==='train_overfit' && G.overfitEdges && G.overfitEdges.some(oe=>oe.key===e.key)) cls += ' selectable';
    else if (G.testPath.length>0 && viewedIdx()===G.currentPlayer && isEdgeInPath(e.key)) cls += ' path-highlight';
    const oc = canAct ? ` onclick="clickEdge('${e.key}')"` : '';
    html += `<line class="${cls}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"${oc}/>`;
    if (p.blocked.includes(e.key)) {
      const mx=(x1+x2)/2, my=(y1+y2)/2;
      html += `<line class="overfit-x" x1="${mx-8}" y1="${my-8}" x2="${mx+8}" y2="${my+8}"/>`;
      html += `<line class="overfit-x" x1="${mx+8}" y1="${my-8}" x2="${mx-8}" y2="${my+8}"/>`;
    }
  }

  // Input labels — solid player-color box, grayscale animal inside (photo frame style)
  const playerHex = vp().hex;
  for (let i=0;i<5;i++) {
    const {x,y}=INP[i];
    const test = canAct && G.phase==='test_animal' && !p.tested[i];
    const sz=38, fw=5, cx=x, cy=y-6;
    const bx=cx-sz/2-fw, by=cy-sz/2-fw, bw=sz+fw*2, bh=sz+fw*2;
    const oc = test?` onclick="clickAnimal(${i})" style="cursor:pointer"`:'';
    // Colored box background
    html += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="4" fill="${playerHex}" opacity="${test?1:0.85}"${oc}/>`;
    // Bright border when clickable (test phase)
    if (test) html += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="4" fill="none" stroke="white" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.9"/>`;
    // Grayscale animal image
    html += `<image href="images/${ANIMAL_IMGS[i]}.png" x="${cx-sz/2}" y="${cy-sz/2}" width="${sz}" height="${sz}" style="filter:grayscale(1)"${oc}/>`;
    html += `<text class="input-label" x="${x}" y="${y+26}" text-anchor="middle" font-size="10" fill="${playerHex}">${ANIMALS[i]}</text>`;
  }

  // Output labels — player-color tinted animal; dimmed until tested
  for (let i=0;i<5;i++) {
    const {x,y}=OUTP[i];
    const ai=G.animalOrder[i];
    const t=p.tested[ai];
    const sz=34, cx=x, cy=y-6;
    const filt=colorizeFilter(playerHex);
    const opacity=t?1:0.4;
    html += `<image href="images/${ANIMAL_IMGS[ai]}.png" x="${cx-sz/2}" y="${cy-sz/2}" width="${sz}" height="${sz}" style="filter:${filt};opacity:${opacity}"/>`;
    html += `<text class="output-label" x="${x}" y="${y+24}" text-anchor="middle" font-size="10" fill="${t?playerHex:'#bbb'}">${ANIMALS[ai]}${t?' ✓':''}</text>`;
  }

  // Nodes
  for (let i=0;i<11;i++) {
    const {x,y}=NP[i];
    let cls='node-circle';
    if (p.nodes[i]&&p.data[i]>=3) cls+=' maxed'; else if (p.nodes[i]) cls+=' placed';
    const dClick = canAct&&G.phase==='design'&&!p.nodes[i];
    const tClick = canAct&&(G.phase==='train1'||G.phase==='train2')&&p.nodes[i]&&p.data[i]<3;
    const pClick = canAct&&['test_path_l1','test_path_l2','test_path_l3'].includes(G.phase)&&G.pathClickable&&G.pathClickable.includes(i);
    const isPN = viewedIdx()===G.currentPlayer&&G.testPath.includes(i);
    if (dClick||tClick||pClick) cls+=' clickable';
    if (isPN) cls+=' path-selected';
    const oc=(dClick||tClick||pClick)?` onclick="clickNode(${i})"`:'';
    html += `<circle class="${cls}" cx="${x}" cy="${y}" r="26"${oc}/>`;
    const layer=i<=3?1:(i<=6?2:3);
    if (!p.nodes[i]) {
      html += `<text class="node-label" x="${x}" y="${y+4}" text-anchor="middle">L${layer}</text>`;
    } else {
      if (p.data[i]>0) html += `<text class="node-data" x="${x}" y="${y-4}" text-anchor="middle" fill="${p.data[i]>=3?'#fc0':'#7b9fff'}">${'●'.repeat(p.data[i])}</text>`;
      html += `<text class="node-label" x="${x}" y="${y+(p.data[i]>0?14:4)}" text-anchor="middle" fill="#8b8bbb">N${i}</text>`;
      if (p.data[i]>=3) html += `<text x="${x}" y="${y+28}" text-anchor="middle" font-size="9" fill="#fc0">MAX</text>`;
    }
  }

  // Layer headers
  html += `<text x="60" y="22" fill="#444" font-size="11" text-anchor="middle">INPUT</text>`;
  html += `<text x="230" y="22" fill="#444" font-size="11" text-anchor="middle">LAYER 1</text>`;
  html += `<text x="400" y="22" fill="#444" font-size="11" text-anchor="middle">LAYER 2</text>`;
  html += `<text x="570" y="22" fill="#444" font-size="11" text-anchor="middle">LAYER 3</text>`;
  html += `<text x="770" y="22" fill="#444" font-size="11" text-anchor="middle">OUTPUT</text>`;

  if (viewedIdx() !== myId) {
    html += `<rect x="0" y="0" width="870" height="490" fill="none" stroke="${vp().hex}" stroke-width="4" stroke-dasharray="12,4" rx="8"/>`;
    html += `<text x="435" y="480" text-anchor="middle" fill="${vp().hex}" font-size="13">Viewing ${vp().name}'s Board</text>`;
  }

  svg.innerHTML = html;
}

function isEdgeInPath(key) {
  if (!G||G.testPath.length===0) return false;
  const ai=G.testAnimal, to=G.animalOrder.indexOf(ai), p=G.testPath;
  return (p.length>=1&&key==='in'+ai+'-'+p[0])||(p.length>=2&&key===p[0]+'-'+p[1])||(p.length>=3&&key===p[1]+'-'+p[2])||(p.length>=3&&key===p[2]+'-out'+to);
}

function hasNodeSlots(p) { return p.nodes.some(n => !n); }
function hasEnoughDataSlots(p) {
  let s = 0;
  for (let i = 0; i < 11; i++) if (p.nodes[i] && p.data[i] < 3) s += (3 - p.data[i]);
  return s >= 2;
}
function hasTestablePath(p) {
  for (let a = 0; a < 5; a++) {
    if (p.tested[a]) continue;
    const to = G.animalOrder.indexOf(a);
    for (const l1 of (INPUT_TO_L1[a]||[])) {
      if (!p.nodes[l1]) continue;
      for (const l2 of (L1_TO_L2[l1]||[])) {
        if (!p.nodes[l2] || p.blocked.includes(l1+'-'+l2)) continue;
        for (const l3 of (L2_TO_L3[l2]||[])) {
          if (!p.nodes[l3] || p.blocked.includes(l2+'-'+l3)) continue;
          if ((L3_TO_OUT[l3]||[]).includes(to) && !p.blocked.includes(l3+'-out'+to)) return true;
        }
      }
    }
  }
  return false;
}

function renderSidePanel() {
  const canAct = isMyTurn() && viewedIdx() === myId;
  const p = vp();
  const base = !canAct || G.phase!=='idle' || G.actionsLeft<=0;
  document.getElementById('btn-design').disabled = base || !hasNodeSlots(p);
  document.getElementById('btn-train').disabled = base || !hasEnoughDataSlots(p);
  document.getElementById('btn-test').disabled = base || !hasTestablePath(p);
  document.getElementById('btn-end-turn').style.display = (canAct && G.phase==='idle' && G.actionsLeft>0 && G.actionsLeft<3) ? 'block' : 'none';

  // Clean tracker for viewed player
  let ct='';
  for (let i=0;i<5;i++) {
    let cls='clean-step';
    if (i<p.cleanUses) cls+=' used'; else if (i===p.cleanUses) cls+=' active';
    ct += `<div class="${cls}">${CLEAN_PENALTIES[i]}</div>`;
  }
  document.getElementById('clean-tracker').innerHTML = ct;

  // Dice
  for (let i=0;i<3;i++) {
    const die=document.getElementById('die-'+i);
    die.textContent = G.dice[i]||'-';
    die.className = 'die';
    if (canAct && G.phase==='test_clean_reroll') {
      die.className += ' clickable'+(selectedDice.has(i)?' selected':'');
      die.onclick = ()=>toggleDie(i);
    } else if (canAct && G.phase==='test_clean_flip') {
      die.className += ' clickable';
      die.onclick = ()=>flipDie(i);
    } else { die.onclick=null; }
  }

  // Test info
  let ti='';
  if (G.phase==='test_eval' && viewedIdx()===G.currentPlayer) {
    const ds=G.dice[0]+G.dice[1]+G.dice[2];
    const dp=G.testPath.reduce((s,n)=>s+cp().data[n],0);
    const t=ds+dp;
    ti = `Dice: ${ds} + Data: ${dp} = <b style="color:${t>=TEST_THRESHOLD?'#4aff4a':'#ff4a4a'}">${t}</b> (need ${TEST_THRESHOLD})`;
  }
  document.getElementById('test-info').innerHTML = ti;
  renderScoreboard();
}

function renderScoreboard() {
  const numP=G.players.length, vals=SCORE_VALUES[numP];
  let h='<table class="score-table"><tr><th></th>';
  for (let i=0;i<vals.length;i++) h+=`<th class="score-val">${vals[i]}pt</th>`;
  h+='</tr>';
  for (let a=0;a<5;a++) {
    h+=`<tr><td class="score-animal"><img src="images/${ANIMAL_IMGS[a]}.png" style="width:22px;height:22px;object-fit:contain;vertical-align:middle;filter:grayscale(1) brightness(0.35)"></td>`;
    for (let i=0;i<vals.length;i++) {
      const e=G.scoreboard[a][i];
      if (e) { h+=`<td class="score-val"><span style="color:${G.players[e.player].hex}">●</span>${e.bonusTokens>0?`<span style="font-size:9px;color:#fc0">+${e.bonusTokens}</span>`:''}</td>`; }
      else h+=`<td class="score-val" style="color:#333">○</td>`;
    }
    h+='</tr>';
  }
  h+='</table><div style="margin-top:6px;font-size:11px;color:#666">';
  for (let i=0;i<numP;i++) h+=`<span style="color:${G.players[i].hex};margin-right:10px">${G.players[i].name}: ${G.scores[i]}pts</span>`;
  h+='</div>';
  document.getElementById('scoreboard').innerHTML = h;
}

function renderStatus() {
  const el=document.getElementById('status');
  const canAct = isMyTurn() && viewedIdx()===myId;
  if (!canAct) {
    let m = G.gameOver ? 'Game over!' : (viewedIdx()!==myId ? `Viewing ${vp().name}'s board.` : `Waiting for ${cp().name}'s turn...`);
    el.innerHTML = `<span class="msg">${m}</span>`;
    return;
  }
  const p=vp();
  let msg='', btn='';
  switch (G.phase) {
    case 'idle': msg = G.actionsLeft>0 ? 'Choose an action.' : 'Turn complete.'; break;
    case 'design': msg='Click an empty node to place a Node Token.'; break;
    case 'train1': msg='Click a node to place Data Token 1 of 2.'; break;
    case 'train2': msg='Click a node to place Data Token 2 of 2.'; break;
    case 'train_overfit': msg='⚠️ Node maxed! Click a yellow edge to block.'; break;
    case 'test_animal': msg='Click a highlighted animal (left) to test.'; break;
    case 'test_path_l1': msg=`Testing ${EMOJI[G.testAnimal]} — Click a Layer 1 node.`; break;
    case 'test_path_l2': msg=`Testing ${EMOJI[G.testAnimal]} — Click a Layer 2 node.`; break;
    case 'test_path_l3': msg=`Testing ${EMOJI[G.testAnimal]} — Click a Layer 3 node.`; break;
    case 'test_roll':
      msg='Path selected! ';
      btn='<button class="primary" onclick="doAction(\'roll_dice\')">Roll Dice</button>';
      break;
    case 'test_eval': {
      const ds=G.dice.reduce((a,b)=>a+b,0), dp=G.testPath.reduce((s,n)=>s+p.data[n],0), t=ds+dp;
      if (t>=TEST_THRESHOLD) { msg=`✅ Passed! (${t} ≥ ${TEST_THRESHOLD}) `; btn='<button class="primary" onclick="doAction(\'resolve_success\')">Score!</button>'; }
      else {
        msg=`❌ Value: ${t} (need ${TEST_THRESHOLD}). `;
        if (p.cleanUses<4) {
          btn='<button onclick="startCleanReroll()">Reroll Dice</button>';
          if (p.cleanUses<2) btn+=' <button onclick="startCleanFlip()">Flip a Die</button>';
          btn+=' <button class="danger" onclick="doAction(\'resolve_fail\')">Accept Fail</button>';
        } else btn='<button class="danger" onclick="doAction(\'resolve_fail\')">Accept Fail</button>';
      }
      break;
    }
    case 'test_clean_reroll':
      msg='Click dice to select for reroll, then confirm.';
      btn='<button class="primary" onclick="confirmReroll()">Reroll Selected</button> <button onclick="cancelClean()">Cancel</button>';
      break;
    case 'test_clean_flip':
      msg='Click a die to flip it (1↔6, 2↔5, 3↔4).';
      btn='<button onclick="cancelClean()">Cancel</button>';
      break;
  }
  el.innerHTML = `<span class="msg">${msg}</span>${btn}`;
}

// ==================== ACTIONS ====================
function doAction(action, extra) { sendMsg({ type:'game_action', action, ...(extra||{}) }); }
function clickNode(id) {
  if (G.phase==='design') doAction('place_node',{nodeId:id});
  else if (G.phase==='train1'||G.phase==='train2') doAction('place_data',{nodeId:id});
  else if (['test_path_l1','test_path_l2','test_path_l3'].includes(G.phase)) doAction('select_path_node',{nodeId:id});
}
function clickEdge(key) { if (G.phase==='train_overfit') doAction('select_overfit_edge',{edgeKey:key}); }
function clickAnimal(idx) { if (G.phase==='test_animal') doAction('select_animal',{animalIdx:idx}); }

// Clean data UI (local phase override)
function startCleanReroll() { selectedDice=new Set(); G.phase='test_clean_reroll'; renderGame(); }
function startCleanFlip() { G.phase='test_clean_flip'; renderGame(); }
function cancelClean() { G.phase='test_eval'; selectedDice=new Set(); renderGame(); }
function toggleDie(i) { if(selectedDice.has(i)) selectedDice.delete(i); else selectedDice.add(i); renderGame(); }
function confirmReroll() { if(!selectedDice.size) return; doAction('clean_reroll',{diceIndices:[...selectedDice]}); selectedDice=new Set(); }
function flipDie(i) { doAction('clean_flip',{dieIdx:i}); }

// ==================== GAME OVER ====================
function showGameOver() {
  const scores = G.players.map((p,i)=>({idx:i,score:G.scores[i],player:p})).sort((a,b)=>b.score-a.score);
  let h='<table><tr><th>Player</th><th>Score</th></tr>';
  for (const s of scores) {
    const w=s.score===scores[0].score;
    const c=w?' class="winner"':'';
    h+=`<tr${c}><td><span style="color:${s.player.hex}">● ${s.player.name}</span>${s.idx===myId?' (You)':''}${w?' 👑':''}</td><td${c}>${s.score}</td></tr>`;
  }
  h+='</table>';
  document.getElementById('final-scores').innerHTML = h;
  showScreen('gameover');
}

// ==================== INIT ====================
connect();
</script>
</body>
</html>
