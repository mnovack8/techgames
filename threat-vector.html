<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual War Room — AI Security Adventure | Tech Board Games</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100%;
  font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
  background: #0d1f00;
  color: #f0f7e6;
  overflow-y: auto;
}

/* ===== HEADER ===== */
header {
  background: rgba(10,26,0,0.95);
  border-bottom: 2px solid rgba(209,219,36,0.3);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(8px);
}
.header-logo {
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.header-logo img { width: 30px; height: 30px; object-fit: contain; }
.logo-text { font-size: 14px; font-weight: 800; color: #a8c96a; }
.logo-sub { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; display: block; line-height: 1; color: rgba(209,219,36,0.6); }
.header-back { font-size: 13px; font-weight: 700; color: rgba(209,219,36,0.7); text-decoration: none; padding: 6px 14px; border: 1px solid rgba(209,219,36,0.25); border-radius: 7px; transition: all 0.15s; }
.header-back:hover { color: #d1db24; border-color: rgba(209,219,36,0.6); background: rgba(209,219,36,0.08); }

/* ===== GAME WRAPPER ===== */
#game {
  min-height: calc(100vh - 60px);
  display: flex;
  flex-direction: column;
}

/* ===== STATUS BAR ===== */
#status-bar {
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(98,181,23,0.25);
  padding: 10px 32px;
  display: none;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
#status-bar.visible { display: flex; }
.sb-section { display: flex; flex-direction: column; gap: 3px; }
.sb-label {
  font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
  color: rgba(240,247,230,0.3);
}
.sb-divider {
  width: 1px; height: 36px; background: rgba(98,181,23,0.25); flex-shrink: 0;
}
.status-role {
  font-size: 12px; font-weight: 800; color: #d1db24; letter-spacing: 0.3px;
}
.status-items {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-height: 20px;
}
.status-item {
  font-size: 11px; font-weight: 700;
  background: rgba(209,219,36,0.12); border: 1px solid rgba(209,219,36,0.35);
  border-radius: 20px; padding: 4px 12px; color: #d1db24;
  animation: item-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes item-pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.status-phase {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: rgba(240,247,230,0.3); margin-left: auto;
}

/* ===== MOOD BAR ===== */
#mood-bar {
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(98,181,23,0.18);
  display: none; flex-direction: column;
}
#mood-bar.visible { display: flex; }
#mood-decision-row {
  display: none; align-items: center; justify-content: center;
  gap: 10px; padding: 5px 24px;
  background: rgba(0,0,0,0.35);
  border-bottom: 1px solid rgba(98,181,23,0.1);
  font-size: 11px; flex-wrap: wrap;
}
#mood-decision-row.active { display: flex; }
#mood-decision-text { color: rgba(240,247,230,0.45); font-weight: 700; white-space: nowrap; }
.mood-d-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 900; padding: 2px 10px;
  border-radius: 20px; letter-spacing: 0.3px;
}
.mood-d-pill.pos { background: rgba(98,181,23,0.2); border: 1px solid rgba(98,181,23,0.4); color: #8ed95a; }
.mood-d-pill.neg { background: rgba(220,50,30,0.18); border: 1px solid rgba(220,50,30,0.35); color: #e07060; }
.mood-d-pill.neu { background: rgba(200,200,200,0.08); border: 1px solid rgba(240,247,230,0.15); color: rgba(240,247,230,0.4); }
#mood-faces-row { display: flex; align-items: stretch; }
.mood-cell {
  display: flex; flex-direction: column; align-items: center;
  gap: 1px; padding: 7px 6px 8px; flex: 1;
  border-right: 1px solid rgba(98,181,23,0.1);
  transition: background 0.45s;
}
.mood-cell:last-child { border-right: none; }
.mood-cell-icon { font-size: 11px; opacity: 0.45; line-height: 1; }
.mood-face { font-size: 19px; line-height: 1; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); }
.mood-level { font-size: 8px; font-weight: 900; color: rgba(240,247,230,0.25); }
.mood-delta { font-size: 9px; font-weight: 900; min-height: 13px; line-height: 1.4; }
.mood-delta.up   { color: #62b517; }
.mood-delta.neu  { color: rgba(240,247,230,0.38); }
.mood-delta.dn   { color: #e05050; }
.mood-role-label { font-size: 7px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.3px; color: rgba(240,247,230,0.22); }
/* Level-based cell tints */
.mood-cell.lv1 { background: rgba(220,50,30,0.16); }
.mood-cell.lv2 { background: rgba(220,50,30,0.07); }
.mood-cell.lv3 { background: rgba(200,200,200,0.03); }
.mood-cell.lv4 { background: rgba(98,181,23,0.07); }
.mood-cell.lv5 { background: rgba(98,181,23,0.16); }
/* Level-based label tints */
.mood-cell.lv1 .mood-role-label,.mood-cell.lv2 .mood-role-label { color: rgba(220,80,60,0.5); }
.mood-cell.lv3 .mood-role-label { color: rgba(240,247,230,0.28); }
.mood-cell.lv4 .mood-role-label,.mood-cell.lv5 .mood-role-label { color: rgba(98,181,23,0.5); }
/* Skill pill history per stakeholder */
.mood-history {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; margin-top: 6px; width: 100%;
}
.mood-hist-pill {
  font-size: 7px; font-weight: 900; letter-spacing: 0.2px;
  padding: 2px 6px; border-radius: 8px; text-align: center;
  line-height: 1.5; width: 100%; box-sizing: border-box;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  animation: pill-in 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes pill-in { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.mood-hist-pill.pos { background: rgba(98,181,23,0.18); border: 1px solid rgba(98,181,23,0.32); color: #8ed95a; }
.mood-hist-pill.neg { background: rgba(220,50,30,0.16); border: 1px solid rgba(220,50,30,0.3); color: #e07060; }
.mood-hist-pill.gry { background: rgba(200,200,200,0.07); border: 1px solid rgba(240,247,230,0.12); color: rgba(240,247,230,0.35); }

/* ===== SCREEN BASE ===== */
.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 80px;
  animation: screen-in 0.4s ease both;
}
@keyframes screen-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

.screen-inner {
  width: 100%;
  max-width: 780px;
}

/* ===== EYEBROW / LABEL ===== */
.eyebrow {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 2.5px; color: #d1db24;
  border-left: 3px solid rgba(209,219,36,0.5); padding-left: 10px;
  margin-bottom: 20px;
}

/* ===== COVER SCREEN ===== */
.cover-wrap {
  min-height: calc(100vh - 60px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 48px 24px;
  background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%2362b517' stroke-opacity='0.08' stroke-width='1.5' fill='none' stroke-linecap='round'%3E%3Cpolyline points='0,30 40,30 40,75'/%3E%3Ccircle cx='40' cy='30' r='3'/%3E%3Ccircle cx='40' cy='75' r='3'/%3E%3Cline x1='40' y1='75' x2='100' y2='75'/%3E%3Cline x1='70' y1='0' x2='70' y2='30'/%3E%3Ccircle cx='70' cy='30' r='2.5'/%3E%3Cline x1='70' y1='30' x2='100' y2='30'/%3E%3Cline x1='0' y1='55' x2='15' y2='55'/%3E%3Ccircle cx='15' cy='55' r='2.5'/%3E%3Cline x1='15' y1='55' x2='15' y2='100'/%3E%3C/g%3E%3C/svg%3E");
  background-size: 100px 100px;
}
.cover-kicker {
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px;
  color: rgba(209,219,36,0.6); margin-bottom: 20px;
}
.cover-title {
  font-size: clamp(38px,8vw,72px); font-weight: 900; color: #f0f7e6;
  line-height: 1.05; margin-bottom: 10px;
}
.cover-title span { color: #d1db24; }
.cover-subtitle {
  font-size: clamp(14px,2vw,18px); color: rgba(240,247,230,0.6);
  margin-bottom: 40px; line-height: 1.5; max-width: 520px;
}
.cover-meta {
  font-size: 12px; color: rgba(240,247,230,0.35); margin-top: 24px;
  line-height: 1.8;
}
.debug-toggle {
  display: inline-flex; align-items: center; gap: 7px; margin-top: 14px;
  font-size: 11px; font-weight: 700; color: rgba(209,219,36,0.45);
  cursor: pointer; user-select: none; letter-spacing: 0.5px;
}
.debug-toggle input[type=checkbox] {
  width: 14px; height: 14px; accent-color: #d1db24; cursor: pointer;
}
.debug-toggle:hover { color: rgba(209,219,36,0.75); }

/* ===== BUTTONS ===== */
.btn-primary {
  display: inline-block; padding: 16px 40px;
  background: #d1db24; color: #1a3a00;
  font-family: inherit; font-size: 15px; font-weight: 900;
  border: none; border-radius: 10px; cursor: pointer;
  text-decoration: none; letter-spacing: 0.3px;
  transition: all 0.15s; box-shadow: 0 4px 20px rgba(209,219,36,0.3);
}
.btn-primary:hover { background: #e0ea2a; transform: translateY(-2px); box-shadow: 0 6px 28px rgba(209,219,36,0.45); }
.btn-secondary {
  display: inline-block; padding: 12px 28px;
  background: rgba(240,247,230,0.08); color: #f0f7e6;
  font-family: inherit; font-size: 13px; font-weight: 700;
  border: 1.5px solid rgba(240,247,230,0.2); border-radius: 9px; cursor: pointer;
  text-decoration: none; transition: all 0.15s;
}
.btn-secondary:hover { background: rgba(240,247,230,0.14); border-color: rgba(240,247,230,0.4); }

/* ===== STORY TEXT ===== */
.story-text {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(98,181,23,0.2);
  border-radius: 16px;
  padding: 32px 36px;
  margin-bottom: 28px;
}
.story-text h2 {
  font-size: clamp(20px,3vw,28px); font-weight: 900; color: #f0f7e6;
  margin-bottom: 16px; line-height: 1.2;
}
.story-text p {
  font-size: 15px; color: rgba(240,247,230,0.8); line-height: 1.8;
  margin-bottom: 12px;
}
.story-text p:last-child { margin-bottom: 0; }
.story-text .scene-detail {
  font-size: 13px; color: rgba(240,247,230,0.5);
  border-top: 1px solid rgba(98,181,23,0.15);
  margin-top: 16px; padding-top: 14px; line-height: 1.7;
  font-style: italic;
}

/* ===== ROLE CARDS ===== */
.role-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px; margin-top: 28px;
}
@media (max-width: 600px) { .role-grid { grid-template-columns: 1fr; } }
.role-card {
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(98,181,23,0.25);
  border-radius: 14px; padding: 24px;
  cursor: pointer; transition: all 0.2s; text-align: left;
  display: flex; flex-direction: column; gap: 10px;
}
.role-card:hover { border-color: #d1db24; background: rgba(209,219,36,0.08); transform: translateY(-3px); }
.role-icon { font-size: 32px; }
.role-name { font-size: 16px; font-weight: 900; color: #f0f7e6; }
.role-desc { font-size: 13px; color: rgba(240,247,230,0.6); line-height: 1.5; }
.role-power {
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  color: #d1db24; border-top: 1px solid rgba(209,219,36,0.2); padding-top: 10px;
  margin-top: 4px;
}

/* ===== DECISION CARDS ===== */
.question-text {
  font-size: 16px; font-weight: 700; color: #f0f7e6;
  line-height: 1.65; margin-bottom: 24px;
}
.choices { display: flex; flex-direction: column; gap: 12px; }
.choice-card {
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(98,181,23,0.2);
  border-radius: 12px; padding: 18px 22px;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: flex-start; gap: 14px;
}
.choice-card:hover { border-color: rgba(209,219,36,0.5); background: rgba(209,219,36,0.06); }
.choice-letter {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: rgba(98,181,23,0.2); border: 1.5px solid rgba(98,181,23,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: #a8c96a;
}
.choice-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(209,219,36,0.65); margin-bottom: 5px; }
.choice-text { font-size: 14px; color: rgba(240,247,230,0.85); line-height: 1.55; }

/* Impact intro box (replaces full story block on scene screen) */
.impact-intro-box {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(98,181,23,0.18);
  border-radius: 12px; padding: 18px 22px; margin-bottom: 22px;
}
.impact-intro-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: rgba(209,219,36,0.5); margin-bottom: 8px; }
.impact-intro-text { font-size: 13px; color: rgba(240,247,230,0.6); line-height: 1.7; margin: 0; font-style: italic; }

/* Feedback after choice */
.choice-card.correct { border-color: #d1db24; background: rgba(209,219,36,0.1); }
.choice-card.correct .choice-letter { background: #d1db24; color: #1a3a00; border-color: #d1db24; }
.choice-card.wrong { border-color: rgba(240,247,230,0.1); opacity: 0.4; }
.feedback-box {
  border-radius: 10px; padding: 16px 20px; margin-top: 16px;
  font-size: 14px; line-height: 1.6; font-weight: 600;
}
.feedback-box.good { background: rgba(209,219,36,0.12); border: 1.5px solid rgba(209,219,36,0.4); color: #d1db24; }
.feedback-box.info { background: rgba(240,247,230,0.05); border: 1.5px solid rgba(240,247,230,0.12); color: rgba(240,247,230,0.65); }
.feedback-box.bad  { background: rgba(240,247,230,0.05); border: 1.5px solid rgba(240,247,230,0.12); color: rgba(240,247,230,0.65); }
.item-earned { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #d1db24; }

/* ===== DFD DIAGRAM ===== */
.dfd-wrap {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(98,181,23,0.25);
  border-radius: 14px; padding: 28px; margin: 24px 0; overflow-x: auto;
}
.dfd-wrap svg { display: block; width: 100%; max-width: 700px; margin: 0 auto; }

/* ===== BRANCH EVENTS ===== */
.branch-event {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(98,181,23,0.25);
  border-radius: 12px; padding: 22px 26px; margin-bottom: 16px;
}
.branch-num {
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
  color: rgba(209,219,36,0.6); margin-bottom: 8px;
}
.branch-event h3 { font-size: 15px; font-weight: 800; color: #f0f7e6; margin-bottom: 8px; }
.branch-event p { font-size: 13px; color: rgba(240,247,230,0.7); line-height: 1.6; }
.threat-tag {
  display: inline-block; margin-top: 12px;
  font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px;
  background: rgba(255,60,60,0.15); border: 1px solid rgba(255,100,100,0.3);
  color: #ff8a8a; padding: 4px 10px; border-radius: 4px;
}

/* ===== CONTROL CHALLENGES ===== */
.control-challenge {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(98,181,23,0.2);
  border-radius: 14px; padding: 28px 32px; margin-bottom: 20px;
}
.control-challenge h3 { font-size: 18px; font-weight: 900; color: #f0f7e6; margin-bottom: 14px; }
.control-challenge p { font-size: 14px; color: rgba(240,247,230,0.75); line-height: 1.7; margin-bottom: 18px; }
.control-reqs {
  background: rgba(0,0,0,0.25); border-radius: 8px; padding: 14px 18px;
  margin-bottom: 20px; font-size: 13px; color: rgba(240,247,230,0.6);
}
.control-reqs strong { color: rgba(240,247,230,0.9); display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.req-item { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.req-check { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
.req-check.pass { background: rgba(209,219,36,0.25); color: #d1db24; }
.req-check.fail { background: rgba(240,247,230,0.08); color: rgba(240,247,230,0.3); }
.control-result {
  border-radius: 10px; padding: 18px 22px;
  font-size: 14px; line-height: 1.65; font-weight: 700;
}
.control-result.success { background: rgba(98,181,23,0.12); border: 1.5px solid rgba(98,181,23,0.4); color: #a8c96a; }
.control-result.failure { background: rgba(200,50,50,0.1); border: 1.5px solid rgba(200,50,50,0.3); color: #ff8a8a; }
.control-tag { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 8px; }

/* ===== ENDINGS ===== */
.ending-wrap { text-align: center; max-width: 680px; margin: 0 auto; }
.ending-icon { font-size: 72px; margin-bottom: 24px; }
.ending-verdict { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px; }
.ending-wrap h2 { font-size: clamp(26px,4vw,40px); font-weight: 900; line-height: 1.15; margin-bottom: 20px; }
.ending-wrap p { font-size: 15px; color: rgba(240,247,230,0.75); line-height: 1.8; margin-bottom: 14px; }
.failure-summary {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(240,247,230,0.1);
  border-radius: 12px; padding: 20px 24px; margin: 24px 0; text-align: left;
}
.failure-summary-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(240,247,230,0.4); margin-bottom: 12px; }
.failure-line { font-size: 13px; color: #ff8a8a; padding: 6px 0; border-bottom: 1px solid rgba(240,247,230,0.06); display: flex; gap: 10px; }
.failure-line:last-child { border-bottom: none; }
.success-line { font-size: 13px; color: #a8c96a; padding: 6px 0; border-bottom: 1px solid rgba(240,247,230,0.06); display: flex; gap: 10px; }
.success-line:last-child { border-bottom: none; }

/* ===== PROGRESS ===== */
.progress-bar {
  display: flex; gap: 6px; margin-bottom: 28px;
}
.progress-step {
  height: 3px; flex: 1; border-radius: 2px;
  background: rgba(240,247,230,0.12);
  transition: background 0.3s;
}
.progress-step.done { background: rgba(209,219,36,0.5); }
.progress-step.active { background: #d1db24; }

/* ===== CONTINUE BUTTON AREA ===== */
.continue-area { margin-top: 28px; display: flex; justify-content: center; }
.action-area { margin-top: 28px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

/* ===== IMPACT SELECTION ===== */
.impact-card {
  display: flex; align-items: center; gap: 20px;
  background: rgba(255,255,255,0.04); border: 2px solid rgba(98,181,23,0.25);
  border-radius: 14px; padding: 22px 24px; cursor: pointer; transition: all 0.2s;
}
.impact-card:hover { border-color: #d1db24; background: rgba(209,219,36,0.07); transform: translateX(4px); }
.impact-num {
  font-size: 28px; font-weight: 900; color: rgba(209,219,36,0.25);
  min-width: 36px; line-height: 1; flex-shrink: 0;
}
.impact-body { flex: 1; }
.impact-title { font-size: 15px; font-weight: 900; color: #f0f7e6; margin-bottom: 6px; }
.impact-desc { font-size: 13px; color: rgba(240,247,230,0.55); line-height: 1.6; }
.impact-arrow { font-size: 20px; color: rgba(209,219,36,0.4); flex-shrink: 0; transition: all 0.2s; }

<script>
// ===== GAME STATE =====
const G = {
  started: false,       // true once team intro is passed
  role: null,           // unused — kept for legacy compat only
  items: [],            // insight keys earned this run
  controls: [],         // [{id, pass}]
  selectedImpact: null, // 'leakage' | 'fairlending' | 'explainability'
  moods: { business: 3, engineer: 3, security: 3, datascientist: 3 }, // 1–5 scale
  lastChoice: null,      // { label, item, effects } — drives decision row in mood bar
  choiceHistory: [],     // all past choices — drives per-stakeholder pill history
  screen: 'cover'
};

const ROLES = {
  business: {
    icon: '🏛️', name: 'Business Stakeholder',
    desc: 'You own the lending portfolio. You translate credit risk into regulatory language and board-level consequence.',
    power: 'Auto-pass: Fair Lending & Compliance controls'
  },
  engineer: {
    icon: '💻', name: 'AI / Software Engineer',
    desc: 'You built CLEO. You know every data flow, API call, and where the underwriting logic lives.',
    power: 'Auto-pass: Auditability & Technical controls'
  },
  security: {
    icon: '🛡️', name: 'Security Practitioner',
    desc: 'You hunt threats. You know how attackers probe decision systems and where sensitive signals leak.',
    power: 'Auto-pass: Auditability & Threat controls'
  },
  datascientist: {
    icon: '🔬', name: 'Data Scientist',
    desc: 'You trained CLEO. You know what a healthy credit risk distribution looks like and how to detect when it shifts.',
    power: 'Auto-pass: Monitoring & Data controls'

};

const ITEMS = {
  // Leakage path insights
  credit_risk_brief:{ label: '💰 Credit Risk Insight',      short: '💰 Credit Risk' },
  evasion_report:   { label: '🔍 Evasion Insight',          short: '🔍 Evasion' },
  // Fair Lending path insights
  compliance_shield:{ label: '⚖️ Compliance Insight',       short: '⚖️ Compliance' },
  bias_analysis:    { label: '📊 Bias Analysis Insight',    short: '📊 Bias Analysis' },
  // Explainability path insights
  audit_trail:      { label: '📋 Audit Trail Insight',      short: '📋 Audit Trail' },
  lean_spec:        { label: '📐 Lean Delivery Insight',    short: '📐 Lean Delivery' }
};

// Mood shifts per impact × choice
// A & B both earn an insight and roughly mirror each other across stakeholders
// C earns nothing and is broadly negative
const MOOD_MAP = {
  leakage: {
    a: { business:+2, engineer: 0, security:-1, datascientist:-1 }, // Credit Risk Insight — Business loves it, technical roles frustrated
    b: { business:-1, engineer:+1, security:+2, datascientist:+1 }, // Evasion Insight — Security/DS love it, Business finds it abstract
    c: { business:-1, engineer:-1, security:-2, datascientist:-2 }  // No insight — Everyone loses, technical roles most frustrated
  },
  fairlending: {
    a: { business:+2, engineer:-1, security: 0, datascientist:-1 }, // Compliance Insight — Business delighted, DS/Eng groan at compliance overhead
    b: { business:-1, engineer:+1, security: 0, datascientist:+2 }, // Bias Analysis Insight — DS thrilled, Eng appreciates it, Business finds it too technical
    c: { business:-1, engineer:-1, security:-2, datascientist:-1 }  // No insight — Everyone negative, Security most frustrated
  },
  explainability: {
    a: { business:-1, engineer:-2, security:+1, datascientist:+2 }, // Audit Trail Insight — Security/DS want this, Eng horrified by scope, Business nervous
    b: { business:+2, engineer:+1, security:-1, datascientist:-1 }, // Lean Delivery Insight — Business/Eng love it, Security/DS see the gaps
    c: { business:-2, engineer:-1, security:-1, datascientist:-1 }  // No insight — Business most frustrated, everyone negative
  }
};

// ===== STATUS BAR =====
function updateStatusBar() {
  const bar = document.getElementById('status-bar');
  if (!G.started) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  const itemsEl = document.getElementById('sb-items');
  itemsEl.innerHTML = G.items.length
    ? G.items.map(i => `<span class="status-item">${ITEMS[i].short}</span>`).join('')
    : '<span style="font-size:11px;color:rgba(240,247,230,0.2);font-style:italic">No insights yet</span>';
  const phases = {
    setting:'Phase 1 · Business Impact', impact:'Phase 1 · Business Impact',
    impact_dive:'Phase 1 · Business Impact', impact_choice:'Phase 1 · Business Impact',
    dfd_intro:'Phase 2 · Architecture', dfd_branch:'Phase 2 · Architecture',
    threat_paths:'Phase 2 · Threat Analysis', threat_choice:'Phase 2 · Threat Analysis',
    control1:'Phase 3 · Controls', control2:'Phase 3 · Controls', control3:'Phase 3 · Controls',
    ending:'Complete'
  };
  document.getElementById('sb-phase').textContent = phases[G.screen] || '';
  updateMoodBar();
}

// ===== MOOD BAR =====
function updateMoodBar() {
  const bar = document.getElementById('mood-bar');
  if (!bar) return;
  if (!G.started) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');

  const FACES = { 1:'😡', 2:'😟', 3:'😐', 4:'😊', 5:'😄' };
  const roles = ['business','engineer','security','datascientist'];
  const effects = G.lastChoice ? G.lastChoice.effects : {};

  roles.forEach(r => {
    const cell = document.getElementById('mood-' + r);
    if (!cell) return;
    const v = Math.max(1, Math.min(5, G.moods[r]));
    const delta = (effects[r] !== undefined) ? effects[r] : null;

    cell.className = 'mood-cell lv' + v;
    cell.querySelector('.mood-face').textContent = FACES[v];
    cell.querySelector('.mood-level').textContent = v + '/5';

    const dEl = cell.querySelector('.mood-delta');
    if (delta === null) {
      dEl.textContent = ''; dEl.className = 'mood-delta';
    } else if (delta > 0) {
      dEl.textContent = '▲ +' + delta; dEl.className = 'mood-delta up';
    } else if (delta < 0) {
      dEl.textContent = '▼ ' + delta; dEl.className = 'mood-delta dn';
    } else {
      dEl.textContent = '→ 0'; dEl.className = 'mood-delta neu';
    }

    // Pill history
    const histEl = cell.querySelector('.mood-history');
    if (histEl) {
      histEl.innerHTML = G.choiceHistory.map(c => {
        const d = (c.effects && c.effects[r] !== undefined) ? c.effects[r] : 0;
        const cls = d > 0 ? 'pos' : d < 0 ? 'neg' : 'gry';
        const txt = c.item
          ? ITEMS[c.item].short.split(' ').slice(0, 2).join(' ')
          : '✗ No insight';
        return `<div class="mood-hist-pill ${cls}">${txt}</div>`;
      }).join('');
    }
  });

  // Decision header row
  const decRow = document.getElementById('mood-decision-row');
  if (G.lastChoice && decRow) {
    decRow.classList.add('active');
    document.getElementById('mood-decision-text').textContent = G.lastChoice.label + '  →';
    const pill = document.getElementById('mood-decision-pill');
    const net = Object.values(effects).reduce((s, v) => s + v, 0);
    pill.className = 'mood-d-pill ' + (net > 0 ? 'pos' : net < 0 ? 'neg' : 'neu');
    pill.textContent = G.lastChoice.item ? ITEMS[G.lastChoice.item].short : '✗ No skill earned';
  }
}

// ===== RENDER =====
function render(html) {
  document.getElementById('game').innerHTML = html;
  updateStatusBar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== PROGRESS BAR =====
function progress(active) {
  const steps = ['impact','dfd_intro','threat_paths','control1','control2','control3'];
  const idx = steps.indexOf(active);
  return `<div class="progress-bar">${steps.map((s,i) =>
    `<div class="progress-step ${i < idx ? 'done' : i === idx ? 'active' : ''}"></div>`
  ).join('')}</div>`;
}

// ===== SCREENS =====

}

  G.screen = 'role';
  render(`
    <div class="screen">
      <div class="screen-inner">
        <div class="eyebrow">Step 1 — Meet the Team</div>
        <h2 style="font-size:clamp(22px,4vw,32px);font-weight:900;color:#f0f7e6;margin-bottom:12px">You represent all four stakeholders.</h2>
        <p style="font-size:14px;color:rgba(240,247,230,0.55);margin-bottom:8px;line-height:1.7">This is a threat modelling exercise, not a role-play. Every decision you make is a collective one — and each stakeholder will react differently. Some choices will satisfy one group while frustrating another. <strong style="color:rgba(240,247,230,0.8)">The goal is a balanced threat model that everyone can stand behind.</strong></p>
        <p style="font-size:13px;color:rgba(240,247,230,0.35);margin-bottom:24px;line-height:1.6">Watch the stakeholder bar at the top of the screen. Their satisfaction reflects the choices you make. Start neutral. Try to finish green.</p>

function showSetting() {
  G.screen = 'setting';
  render(`
    <div class="screen">
      <div class="screen-inner">
        <div class="eyebrow">Phase 1 · Business Impact — Setting</div>
        <div class="story-text">
          <h2>Synapse Bank. Monday morning. CLEO is live.</h2>
          <p>Eight months ago, Synapse Bank deployed CLEO — the Credit and Loan Evaluation Officer. When a customer submits a loan application, CLEO doesn't simply score it. She investigates.</p>
          <p>CLEO pulls credit bureau data, verifies income and employment records, cross-references affordability models, and reasons through the full picture. Then she decides: approve the loan, reject the application, or route to a human underwriter if her confidence falls below threshold. She processes thousands of applications a day. The human review queue is the exception, not the rule.</p>

// ===== IMPACT SELECTION =====
function showImpactSelection() {

  render(`
    <div class="screen"><div class="screen-inner">
      ${progress('impact')}
      <div class="eyebrow">Phase 1 · Business Impact — Choose Your Focus</div>
      <h2 style="font-size:clamp(20px,3vw,26px);font-weight:900;color:#f0f7e6;margin-bottom:10px;line-height:1.2">Three reports have landed in the war room.</h2>
      <p style="font-size:14px;color:rgba(240,247,230,0.5);margin-bottom:28px;line-height:1.6">Each tells a different story about what CLEO is doing — and what it's costing. Your team has capacity to threat model one. Which risk do you take into the room?</p>
      <div style="display:flex;flex-direction:column;gap:16px;">

            ${dbgPill('A: 📋 Audit Trail &nbsp;·&nbsp; B: 📐 Lean Delivery &nbsp;·&nbsp; C: ✗ No insight')}
          </div>
          <div class="impact-arrow">→</div>
        </div>

      </div>
    </div></div>
  `);
}

// ===== IMPACT SCENES (3 scoping choices each — A & B earn insights, C earns nothing) =====
const IMPACT_SCENES = {

    choiceA: {

function answerImpact(impact, choice) {
  const els = { a: document.getElementById('imp-a'), b: document.getElementById('imp-b'), c: document.getElementById('imp-c') };
  if (!els.a) return;
  Object.values(els).filter(Boolean).forEach(el => { el.onclick = null; el.classList.add('wrong'); });
  if (els[choice]) { els[choice].classList.remove('wrong'); els[choice].classList.add('correct'); }

  const s = IMPACT_SCENES[impact];
  const chosen = s['choice' + choice.toUpperCase()];
  const earnItem = chosen.earns;

  if (earnItem && !G.items.includes(earnItem)) G.items.push(earnItem);

  // Apply mood shifts (clamped to 1–5)
  const moodShift = (MOOD_MAP[impact] && MOOD_MAP[impact][choice]) || {};
  Object.entries(moodShift).forEach(([role, delta]) => {
    G.moods[role] = Math.max(1, Math.min(5, (G.moods[role] || 3) + delta));
  });

  // Store in history
  const choiceEntry = { label: s.eyebrow, item: earnItem, effects: moodShift };
  G.lastChoice = choiceEntry;
  G.choiceHistory.push(choiceEntry);

  const boxStyle = earnItem ? 'good' : 'bad';
  document.getElementById('imp-feedback').innerHTML = `
    <div class="feedback-box ${boxStyle}">${chosen.feedback}${earnItem ? `<div class="item-earned">${ITEMS[earnItem].label} — Earned</div>` : ''}</div>
    <div class="continue-area"><button class="btn-primary" onclick="showDFD()">Enter the Architecture →</button></div>`;
  updateStatusBar();
}

function showDFDBranches() {

  render(`

function evalControl(controlId) {
  const has = item => G.items.includes(item);
  if (controlId === 'control1') return has('evasion_report') || has('credit_risk_brief');
  if (controlId === 'control2') return has('compliance_shield') || has('bias_analysis');
  if (controlId === 'control3') return has('audit_trail') || has('lean_spec');
  return false;
}

function reqItem(item, label) {
  const have = G.items.includes(item);
  return `<div class="req-item"><div class="req-check ${have?'pass':'fail'}">${have?'✓':'○'}</div><span style="color:${have?'rgba(240,247,230,0.8)':'rgba(240,247,230,0.35)'}">${label}</span></div>`;
}
function reqRole(role, label) {
  const have = G.role === role;
  return `<div class="req-item"><div class="req-check ${have?'pass':'fail'}">${have?'✓':'○'}</div><span style="color:${have?'rgba(240,247,230,0.8)':'rgba(240,247,230,0.35)'}">${label}</span></div>`;
}

function showControl1() {
  G.screen = 'control1';
  const pass = evalControl('control1');
  render(`
    <div class="screen">
      <div class="screen-inner">
        ${progress('control1')}
        <div class="eyebrow">Phase 3 · Control 1 of 3 — What are we going to do about it?</div>
        <div class="control-challenge">
          <h3>#MONITOR USE — Real-Time Agent Interaction Monitoring</h3>
          <p>To reduce the severity of both the evasion and prompt injection threats, CLEO needs real-time monitoring of all agent interactions — including natural language inputs. This means monitoring for application inputs that probe CLEO's approval boundary, detecting when CLEO's decisions deviate from her intended lending mandate, and alerting when behaviour patterns suggest adversarial input rather than genuine applications.</p>
          <p>Unlike traditional security controls that detect consistent technical attack patterns, this control must detect changes in <em>data behaviour</em> relative to CLEO's credit decision logic. That requires someone who can translate what "normal" credit application behaviour looks like mathematically — and define when it has shifted.</p>
          <div class="control-reqs">
            <strong>You can apply this control if you have:</strong>
            ${reqItem('evasion_report',    'Insight: Evasion — documented AI evasion attack via confidence signal probing')}
            ${reqItem('credit_risk_brief', 'Insight: Credit Risk — documented financial exposure from the fraudulent approval cluster')}
          </div>
          ${pass
            ? `<div class="control-result success"><span class="control-tag">✓ Control Applied</span>Real-time monitoring is live. Application input patterns, confidence score distributions, and proximity-to-threshold submissions are all tracked. The next probing campaign triggers an alert within hours. CLEO's lending mandate is now actively enforced — inputs attempting to direct her outside her authorised scope are flagged immediately.</div>`
            : `<div class="control-result failure"><span class="control-tag">✗ Control Failed</span>Without the expertise to define what normal credit application behaviour looks like — and without documented evidence of the specific attack pattern — generic volume monitoring is configured. It counts requests. It doesn't detect behaviour. The fraud ring continues. The prompt injection risk remains open.</div>`
          }
        </div>
        <div class="continue-area">
          <button class="btn-primary" onclick="showControl2()">Next Control →</button>
        </div>
      </div>
    </div>
  `);
  G.controls.push({ id: 'control1', pass });
}

function showControl2() {
  G.screen = 'control2';
  const pass = evalControl('control2');
  render(`
    <div class="screen">
      <div class="screen-inner">
        ${progress('control2')}
        <div class="eyebrow">Phase 3 · Control 2 of 3 — What are we going to do about it?</div>
        <div class="control-challenge">
          <h3>#MONITOR BIAS — Fair Lending Outcome Monitoring</h3>
          <p>To address CLEO's discriminatory approval patterns, outcome monitoring must track approval and rejection rates across protected characteristics — postcode, age, and any proxy variables that correlate with ethnicity or other protected groups. This means defining a mathematical fairness baseline: what distribution of lending decisions is acceptable under applicable law, and at what point of deviation should an alert fire?</p>
          <p>This is not a generic technical control. It requires knowing what fairness means under fair lending regulation, and the authority to mandate that this monitoring is prioritised as a compliance requirement — not deferred as an optional model improvement. Without that mandate, it never gets built.</p>
          <div class="control-reqs">
            <strong>You can apply this control if you have:</strong>
            ${reqItem('compliance_shield', 'Insight: Compliance — documented regulatory enforcement risk from discriminatory lending outcomes')}

          </div>
          ${pass
            ? `<div class="control-result success"><span class="control-tag">✓ Control Applied</span>Demographic outcome monitoring is implemented. Approval rates are tracked by postcode band, age group, and declared income segment. An alert fires when any protected group's approval rate deviates beyond the defined fairness threshold. The pattern that triggered the FCA inquiry is now visible and measurable in real time.</div>`
            : `<div class="control-result failure"><span class="control-tag">✗ Control Failed</span>Without the regulatory context to define fairness thresholds — and without documented evidence of the discriminatory pattern — the monitoring is deprioritised. CLEO continues approving loans. The approval gap widens. The FCA inquiry becomes a formal enforcement action.</div>`
          }
        </div>

          <button class="btn-primary" onclick="showControl3()">Next Control →</button>

  G.controls.push({ id: 'control2', pass });
}

function showControl3() {
  G.screen = 'control3';
  const pass = evalControl('control3');
  render(`
    <div class="screen">
      <div class="screen-inner">
        ${progress('control3')}
        <div class="eyebrow">Phase 3 · Control 3 of 3 — What are we going to do about it?</div>
        <div class="control-challenge">
          <h3>Decision Audit Logging + #OBSCURE CONFIDENCE</h3>
          <p>Two problems must be solved together. First: implement decision audit logging so every CLEO decision can be fully reconstructed — inputs pulled, reasoning chain, confidence score, outcome — and stored securely for legal and regulatory review. The admin dashboard currently shows outcomes only; it provides no true explainability for CLEO's decisions. Second: remove the confidence score from CLEO's broker portal API response while preserving it internally in the audit log. The exposed score is the signal enabling the evasion attack.</p>
          <p>This requires identifying where information leaks exist in the API surface and implementing structured logging at the model inference layer — without breaking the architecture CLEO already runs on.</p>
          <div class="control-reqs">
            <strong>You can apply this control if you have:</strong>
            ${reqItem('audit_trail', 'Insight: Audit Trail — documented portfolio-level legal liability requiring inference-layer decision logging')}
            ${reqItem('lean_spec',   'Insight: Lean Delivery — documented customer transparency gap scoped to point-of-rejection explanations')}
          </div>
          ${pass
            ? `<div class="control-result success"><span class="control-tag">✓ Control Applied</span>Full decision audit logging is implemented. CLEO's reasoning chain, input features, confidence scores, and outcomes are stored securely for every application. The broker portal API response no longer exposes the confidence score. The Ombudsman can now inspect CLEO's reasoning. Fraud rings lose their calibration signal.</div>`
            : `<div class="control-result failure"><span class="control-tag">✗ Control Failed</span>Logging is partial — it captures outcomes but not reasoning chains. The confidence score remains in the broker portal API response. The Ombudsman cannot get the explanation they need. The FCA opens a formal AI governance investigation. The fraud ring keeps iterating.</div>`

}

function showEnding() {
  G.screen = 'ending';
  const failures = G.controls.filter(c => !c.pass);
  const passes = G.controls.filter(c => c.pass);
  const failCount = failures.length;

  const controlLabels = {
    control1: 'Real-time monitoring — evasion and prompt injection remain active and undetected',
    control2: 'Fair lending monitoring — the discriminatory approval pattern goes unmeasured',
    control3: 'Audit logging & confidence obscuring — CLEO remains a legal black box'
  };

  let endingHTML = '';

  if (failCount === 0) {
    endingHTML = `
      <div class="ending-icon">🛡️</div>
      <div class="ending-verdict" style="color:#d1db24">Best Outcome — CLEO Secured</div>
      <h2>The threat model is complete. CLEO is protected.</h2>
      <p>Evasion campaigns are detected in real time before defaults accumulate. Fair lending monitoring catches the postcode bias before the FCA does. Every CLEO decision can be reconstructed for the Ombudsman, courts, and auditors. Synapse Bank's AI lending programme is defensible — and demonstrably so.</p>
      <p>The regulatory review goes well. CLEO continues processing thousands of applications a day, and the team has the evidence to stand behind every decision she makes.</p>
      <div class="failure-summary">
        <div class="failure-summary-title">Controls Applied</div>
        ${passes.map(c => `<div class="success-line"><span>✓</span><span>${
          c.id === 'control1' ? '#MONITOR USE — evasion detection live' :
          c.id === 'control2' ? '#ANOMALOUS INPUT HANDLING — fairness monitoring active' :
          'Audit logging + #OBSCURE CONFIDENCE — decision trail secured'
        }</span></div>`).join('')}
      </div>`;
  } else if (failCount <= 2) {
    endingHTML = `
      <div class="ending-icon">⚠️</div>
      <div class="ending-verdict" style="color:#f0c050">Partial Outcome — Work Remains</div>
      <h2>Some controls held. Some gaps remain open.</h2>
      <p>Your threat model identified the right business impacts and surfaced real threats. But without the right role or evidence for every control, some mitigations couldn't be fully applied.</p>
      <p>ARIA is better protected than before — but not completely. A determined attacker, a regulatory inquiry, or a court case could still find the gaps you left open.</p>
      <div class="failure-summary">
        <div class="failure-summary-title">Controls Applied</div>
        ${passes.map(c => `<div class="success-line"><span>✓</span><span>${
          c.id === 'control1' ? '#MONITOR USE — evasion detection live' :
          c.id === 'control2' ? '#ANOMALOUS INPUT HANDLING — fairness monitoring active' :
          'Audit logging + #OBSCURE CONFIDENCE — decision trail secured'
        }</span></div>`).join('')}
        <div class="failure-summary-title" style="margin-top:14px">Gaps Remaining</div>
        ${failures.map(c => `<div class="failure-line"><span>✗</span><span>${controlLabels[c.id]}</span></div>`).join('')}
      </div>`;
  } else {
    endingHTML = `
      <div class="ending-icon">🔴</div>
      <div class="ending-verdict" style="color:#ff8a8a">Threat Model Failed</div>
      <h2>CLEO is unprotected. The consequences are already in motion.</h2>
      <p>The fraud ring continues calibrating applications to CLEO's approval threshold — defaults accumulate quietly. The fair lending violation triggers a formal FCA enforcement action. The Ombudsman finds no decision logs and rules against the bank. Regulators suspend CLEO's lending authority pending a full AI governance audit.</p>
      <p>The board has questions. The team has none of the answers. CLEO is taken offline.</p>
      <div class="failure-summary">
        <div class="failure-summary-title">All Controls Failed</div>
        ${failures.map(c => `<div class="failure-line"><span>✗</span><span>${controlLabels[c.id]}</span></div>`).join('')}
      </div>`;
  }

  render(`
    <div class="screen">
      <div class="screen-inner">
        <div class="eyebrow">Mission Complete · ${failCount === 0 ? 'Secured' : failCount <= 2 ? 'Partial' : 'Failed'}</div>
        <div class="ending-wrap">
          ${endingHTML}
          <div class="action-area">
            <button class="btn-primary" onclick="restartGame()">Play Again</button>
            <button class="btn-secondary" onclick="window.location.href='/'">Back to Games</button>
          </div>
          <p style="font-size:12px;color:rgba(240,247,230,0.3);margin-top:28px;line-height:1.8">
            Based on the OWASP AI Exchange threat modeling framework.<br>
            Controls referenced: #MONITOR USE · #MONITOR BIAS · #OBSCURE CONFIDENCE · Decision Audit Logging<br>
            Threat types: Evasion · Prompt Injection · Confidence Leakage · Fair Lending Violation · Lack of Explainability
          </p>
        </div>
      </div>
    </div>
  `);
}

function restartGame() {
  G.started = false;
  G.role = null;
  G.items = [];
  G.controls = [];
  G.selectedImpact = null;
  G.moods = { business: 3, engineer: 3, security: 3, datascientist: 3 };
  G.lastChoice = null;
  G.choiceHistory = [];
  G.screen = 'cover';
  document.getElementById('mood-bar').classList.remove('visible');
  document.getElementById('status-bar').classList.remove('visible');
  showCover();
}

let DEBUG = new URLSearchParams(window.location.search).get('debug') === '1';

function dbgPill(text, style = '') {
  if (!DEBUG) return '';
  return `<div class="dbg-pill" style="${style}">${text}</div>`;
}

  leakage:       '⚡ Auto: Data Scientist',

};

function debugSetup() {
  G.started = true;
  if (!G.selectedImpact) G.selectedImpact = 'leakage';
}

function debugJump(fn) {
  debugSetup();
  fn();
}

function initDebug() {
  const existing = document.getElementById('debug-bar');
  if (existing) existing.remove();
  if (!DEBUG) return;
  const bar = document.createElement('div');
  bar.id = 'debug-bar';
  bar.innerHTML = `
    <div class="dbg-label">🛠 Debug</div>
    <div class="dbg-group">
      <span class="dbg-section">Setup</span>
      <button onclick="debugJump(showCover)">Cover</button>
      <button onclick="debugJump(showRoleIntro)">Intro</button>

    </div>
    <div class="dbg-group">
      <span class="dbg-section">Phase 3</span>
      <button onclick="debugJump(()=>{G.controls=[];showControl1()})">Control 1</button>
      <button onclick="debugJump(()=>{G.controls=[{id:'control1',pass:true}];showControl2()})">Control 2</button>
      <button onclick="debugJump(()=>{G.controls=[{id:'control1',pass:true},{id:'control2',pass:true}];showControl3()})">Control 3</button>
    </div>
    <div class="dbg-group">
      <span class="dbg-section">Endings</span>
      <button onclick="debugJump(()=>{G.controls=[{id:'control1',pass:true},{id:'control2',pass:true},{id:'control3',pass:true}];showEnding()})">Best</button>
      <button onclick="debugJump(()=>{G.controls=[{id:'control1',pass:true},{id:'control2',pass:false},{id:'control3',pass:false}];showEnding()})">Partial</button>
      <button onclick="debugJump(()=>{G.controls=[{id:'control1',pass:false},{id:'control2',pass:false},{id:'control3',pass:false}];showEnding()})">Bad</button>
    </div>
  `;
  document.body.appendChild(bar);
}

// ===== INIT =====
showCover();
initDebug();
